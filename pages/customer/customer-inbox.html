<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Inbox - VisionStyle</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #2c3e50;
        --secondary: #3498db;
        --accent: #9b59b6;
        --success: #1eb981;
        --warning: #f59e0b;
        --info: #3b82f6;
        --danger: #dc2626;
        --dark: #1f2937;
        --light: #f9fafb;
        --border: #e5e7eb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        color: var(--dark);
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .page-header {
        background: white;
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 24px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
      }

      .page-title {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .page-title h1 {
        font-size: 2rem;
        color: var(--dark);
      }

      .page-title i {
        color: var(--secondary);
        font-size: 1.8rem;
      }

      .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        font-size: 0.95rem;
      }

      .btn-primary {
        background: var(--secondary);
        color: white;
      }

      .btn-primary:hover {
        background: #2980b9;
      }

      .btn-outline {
        background: white;
        color: var(--primary);
        border: 2px solid var(--primary);
      }

      .btn-outline:hover {
        background: var(--primary);
        color: white;
      }

      .btn-danger {
        background: white;
        border: 2px solid var(--danger);
        color: var(--danger);
      }

      .btn-danger:hover {
        background: var(--danger);
        color: white;
      }

      .inbox-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        color: white;
      }

      .stat-icon.total {
        background: var(--secondary);
      }
      .stat-icon.unread {
        background: var(--danger);
      }
      .stat-icon.replied {
        background: var(--success);
      }

      .stat-info h3 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--dark);
      }

      .stat-info p {
        font-size: 0.9rem;
        color: #6b7280;
      }

      .inbox-container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .inbox-toolbar {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--light);
        padding: 8px 16px;
        border-radius: 8px;
        flex: 1;
        max-width: 300px;
      }

      .search-box input {
        border: none;
        background: transparent;
        outline: none;
        flex: 1;
        font-size: 0.95rem;
      }

      .search-box i {
        color: #9ca3af;
      }

      .filter-tabs {
        display: flex;
        gap: 8px;
      }

      .filter-tab {
        padding: 8px 16px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        color: #6b7280;
        transition: all 0.2s;
      }

      .filter-tab.active {
        background: var(--secondary);
        color: white;
      }

      .filter-tab:hover:not(.active) {
        background: var(--light);
      }

      .message-list {
        max-height: 500px;
        overflow-y: auto;
      }

      .message-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.2s;
      }

      .message-item:hover {
        background: var(--light);
      }

      .message-item.unread {
        background: #eff6ff;
        border-left: 4px solid var(--secondary);
      }

      .message-item.unread:hover {
        background: #dbeafe;
      }

      .message-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 1.2rem;
        flex-shrink: 0;
      }

      .message-content {
        flex: 1;
        min-width: 0;
      }

      .message-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }

      .message-subject {
        font-weight: 600;
        color: var(--dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .message-item.unread .message-subject {
        font-weight: 700;
      }

      .message-date {
        font-size: 0.85rem;
        color: #9ca3af;
        flex-shrink: 0;
        margin-left: 12px;
      }

      .message-preview {
        font-size: 0.9rem;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .message-meta {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .message-badge {
        font-size: 0.75rem;
        padding: 2px 8px;
        border-radius: 12px;
        font-weight: 600;
      }

      .badge-reply {
        background: #dcfce7;
        color: #16a34a;
      }

      .badge-pending {
        background: #fef3c7;
        color: #d97706;
      }

      .empty-inbox {
        text-align: center;
        padding: 60px 20px;
        color: #6b7280;
      }

      .empty-inbox i {
        font-size: 4rem;
        margin-bottom: 20px;
        color: #d1d5db;
      }

      .empty-inbox h3 {
        font-size: 1.25rem;
        margin-bottom: 8px;
        color: var(--dark);
      }

      /* Message Detail Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: 16px;
        width: 100%;
        max-width: 700px;
        max-height: 90vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h2 {
        font-size: 1.25rem;
        color: var(--dark);
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #6b7280;
        padding: 4px;
      }

      .modal-close:hover {
        color: var(--dark);
      }

      .modal-body {
        padding: 24px;
        overflow-y: auto;
        flex: 1;
      }

      .conversation-thread {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .thread-message {
        padding: 16px;
        border-radius: 12px;
        max-width: 85%;
      }

      .thread-message.customer {
        background: var(--light);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .thread-message.admin {
        background: #eff6ff;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border-left: 3px solid var(--secondary);
      }

      .thread-sender {
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 4px;
      }

      .thread-message.customer .thread-sender {
        color: var(--primary);
      }

      .thread-message.admin .thread-sender {
        color: var(--secondary);
      }

      .thread-text {
        font-size: 0.95rem;
        line-height: 1.5;
        color: var(--dark);
      }

      .thread-date {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 8px;
      }

      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        background: var(--light);
      }

      .reply-form {
        display: flex;
        gap: 12px;
      }

      .reply-input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }

      .reply-input:focus {
        border-color: var(--secondary);
      }

      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          text-align: center;
        }

        .inbox-toolbar {
          flex-direction: column;
        }

        .search-box {
          max-width: 100%;
        }

        .filter-tabs {
          width: 100%;
          justify-content: center;
        }

        .message-item {
          flex-direction: column;
          gap: 12px;
        }

        .message-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
        }

        .message-date {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <div class="header-content">
          <div class="page-title">
            <i class="fas fa-envelope"></i>
            <div>
              <h1>My Inbox</h1>
              <p style="color: #6b7280; font-size: 0.95rem">
                Messages & Support - VisionStyle
              </p>
            </div>
          </div>
          <div class="header-actions">
            <a href="contact.html" class="btn btn-primary">
              <i class="fas fa-plus"></i>
              New Message
            </a>
            <a href="customer-orders.html" class="btn btn-outline">
              <i class="fas fa-arrow-left"></i>
              Back to Orders
            </a>
          </div>
        </div>
      </div>

      <!-- Inbox Stats -->
      <div class="inbox-stats">
        <div class="stat-card">
          <div class="stat-icon total">
            <i class="fas fa-envelope"></i>
          </div>
          <div class="stat-info">
            <h3 id="total-messages">0</h3>
            <p>Total Messages</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon unread">
            <i class="fas fa-bell"></i>
          </div>
          <div class="stat-info">
            <h3 id="unread-messages">0</h3>
            <p>Unread Replies</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon replied">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="stat-info">
            <h3 id="replied-messages">0</h3>
            <p>Replied</p>
          </div>
        </div>
      </div>

      <!-- Inbox Container -->
      <div class="inbox-container">
        <div class="inbox-toolbar">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input
              type="text"
              id="search-input"
              placeholder="Search messages..."
              oninput="filterMessages()"
            />
          </div>
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">
              All
            </button>
            <button class="filter-tab" data-filter="unread" onclick="setFilter('unread')">
              Unread
            </button>
            <button class="filter-tab" data-filter="replied" onclick="setFilter('replied')">
              Replied
            </button>
          </div>
        </div>

        <div class="message-list" id="message-list">
          <!-- Messages will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Message Detail Modal -->
    <div class="modal-overlay" id="message-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-subject">Message Subject</h2>
          <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="conversation-thread" id="conversation-thread">
            <!-- Conversation will be loaded here -->
          </div>
        </div>
        <div class="modal-footer">
          <form class="reply-form" onsubmit="sendReply(event)">
            <input
              type="text"
              class="reply-input"
              id="reply-input"
              placeholder="Type your reply..."
              required
            />
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i>
              Send
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const SESSION_KEY = "visionStyleAuthSession";
      let sessionData = {};
      let customerEmail = "";
      let currentFilter = "all";
      let currentMessageId = null;

      // Initialize page
      document.addEventListener("DOMContentLoaded", function () {
        checkAuthentication();
        loadMessages();
        
        // Auto-refresh every 10 seconds
        setInterval(loadMessages, 10000);

        // Listen for storage changes
        window.addEventListener("storage", (e) => {
          if (e.key === "contactMessages") {
            loadMessages();
          }
        });
      });

      // Check if user is logged in
      function checkAuthentication() {
        sessionData = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "{}");
        customerEmail = sessionData.email || "";

        // Check session expiry
        if (sessionData.expiry && Date.now() > sessionData.expiry) {
          sessionStorage.removeItem(SESSION_KEY);
          customerEmail = "";
        }

        if (!customerEmail) {
          document.body.innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">
              <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); text-align: center; max-width: 400px;">
                <i class="fas fa-user-lock" style="font-size: 3rem; color: var(--secondary); margin-bottom: 20px;"></i>
                <h2>Login Required</h2>
                <p style="margin-bottom: 24px; color: #6b7280;">Please log in to access your inbox</p>
                <a href="login.html" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: #3498db; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">
                  <i class="fas fa-sign-in-alt"></i>
                  Go to Login
                </a>
              </div>
            </div>
          `;
          return;
        }

        // Update last activity
        sessionData.lastActivity = Date.now();
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
      }

      // Load messages
      function loadMessages() {
        const messages = JSON.parse(localStorage.getItem("contactMessages") || "[]");
        const userMessages = messages.filter(
          (msg) => msg.email && msg.email.toLowerCase() === customerEmail.toLowerCase()
        );

        // Calculate stats
        let unreadCount = 0;
        let repliedCount = 0;

        userMessages.forEach((msg) => {
          const hasAdminReply = msg.replies && msg.replies.some((r) => r.sender === "admin");
          if (hasAdminReply) {
            repliedCount++;
            if (!msg.readByCustomer) {
              unreadCount++;
            } else if (msg.lastReadTime) {
              const newReplies = msg.replies.filter(
                (r) => r.sender === "admin" && new Date(r.date) > new Date(msg.lastReadTime)
              );
              if (newReplies.length > 0) unreadCount++;
            }
          }
        });

        // Update stats
        document.getElementById("total-messages").textContent = userMessages.length;
        document.getElementById("unread-messages").textContent = unreadCount;
        document.getElementById("replied-messages").textContent = repliedCount;

        // Render messages
        renderMessages(userMessages);
      }

      // Render messages list
      function renderMessages(messages) {
        const container = document.getElementById("message-list");
        const searchTerm = document.getElementById("search-input").value.toLowerCase();

        // Filter messages
        let filteredMessages = messages.filter((msg) => {
          const matchesSearch =
            msg.subject?.toLowerCase().includes(searchTerm) ||
            msg.message?.toLowerCase().includes(searchTerm);

          if (currentFilter === "all") return matchesSearch;

          const hasAdminReply = msg.replies && msg.replies.some((r) => r.sender === "admin");

          if (currentFilter === "unread") {
            if (!hasAdminReply) return false;
            if (!msg.readByCustomer) return matchesSearch;
            if (msg.lastReadTime) {
              const newReplies = msg.replies.filter(
                (r) => r.sender === "admin" && new Date(r.date) > new Date(msg.lastReadTime)
              );
              return newReplies.length > 0 && matchesSearch;
            }
            return false;
          }

          if (currentFilter === "replied") {
            return hasAdminReply && matchesSearch;
          }

          return matchesSearch;
        });

        // Sort by date (newest first)
        filteredMessages.sort((a, b) => new Date(b.date) - new Date(a.date));

        if (filteredMessages.length === 0) {
          container.innerHTML = `
            <div class="empty-inbox">
              <i class="fas fa-inbox"></i>
              <h3>No messages found</h3>
              <p>Start a conversation with our support team</p>
              <a href="contact.html" class="btn btn-primary" style="margin-top: 16px;">
                <i class="fas fa-plus"></i>
                Send Message
              </a>
            </div>
          `;
          return;
        }

        container.innerHTML = filteredMessages
          .map((msg) => {
            const hasAdminReply = msg.replies && msg.replies.some((r) => r.sender === "admin");
            let isUnread = false;

            if (hasAdminReply) {
              if (!msg.readByCustomer) {
                isUnread = true;
              } else if (msg.lastReadTime) {
                const newReplies = msg.replies.filter(
                  (r) => r.sender === "admin" && new Date(r.date) > new Date(msg.lastReadTime)
                );
                isUnread = newReplies.length > 0;
              }
            }

            const initials = (msg.name || "U").charAt(0).toUpperCase();
            const date = new Date(msg.date);
            const dateStr = formatDate(date);
            const lastReply = msg.replies && msg.replies.length > 0
              ? msg.replies[msg.replies.length - 1]
              : null;
            const preview = lastReply
              ? `${lastReply.sender === "admin" ? "Support: " : "You: "}${lastReply.text.substring(0, 80)}...`
              : msg.message?.substring(0, 100) + "...";

            return `
              <div class="message-item ${isUnread ? "unread" : ""}" onclick="openMessage('${msg.id || msg.date}')">
                <div class="message-avatar">${initials}</div>
                <div class="message-content">
                  <div class="message-header">
                    <div class="message-subject">${msg.subject || "No Subject"}</div>
                    <div class="message-date">${dateStr}</div>
                  </div>
                  <div class="message-preview">${preview}</div>
                  <div class="message-meta">
                    ${hasAdminReply
                      ? `<span class="message-badge badge-reply"><i class="fas fa-check"></i> Replied</span>`
                      : `<span class="message-badge badge-pending"><i class="fas fa-clock"></i> Pending</span>`
                    }
                    ${isUnread ? `<span class="message-badge badge-reply" style="background: #fee2e2; color: #dc2626;"><i class="fas fa-bell"></i> New Reply</span>` : ""}
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      // Format date
      function formatDate(date) {
        const now = new Date();
        const diff = now - date;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        if (days === 0) {
          return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        } else if (days === 1) {
          return "Yesterday";
        } else if (days < 7) {
          return date.toLocaleDateString([], { weekday: "short" });
        } else {
          return date.toLocaleDateString([], { month: "short", day: "numeric" });
        }
      }

      // Set filter
      function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.filter === filter);
        });
        loadMessages();
      }

      // Filter messages by search
      function filterMessages() {
        loadMessages();
      }

      // Open message modal
      function openMessage(messageId) {
        const messages = JSON.parse(localStorage.getItem("contactMessages") || "[]");
        const message = messages.find((m) => (m.id || m.date) === messageId);

        if (!message) return;

        currentMessageId = messageId;

        // Mark as read
        message.readByCustomer = true;
        message.lastReadTime = new Date().toISOString();
        localStorage.setItem("contactMessages", JSON.stringify(messages));

        // Update modal
        document.getElementById("modal-subject").textContent = message.subject || "Message";

        const thread = document.getElementById("conversation-thread");
        let html = `
          <div class="thread-message customer">
            <div class="thread-sender">You</div>
            <div class="thread-text">${message.message}</div>
            <div class="thread-date">${new Date(message.date).toLocaleString()}</div>
          </div>
        `;

        if (message.replies && message.replies.length > 0) {
          message.replies.forEach((reply) => {
            const isAdmin = reply.sender === "admin";
            html += `
              <div class="thread-message ${isAdmin ? "admin" : "customer"}">
                <div class="thread-sender">${isAdmin ? "VisionStyle Support" : "You"}</div>
                <div class="thread-text">${reply.text}</div>
                <div class="thread-date">${new Date(reply.date).toLocaleString()}</div>
              </div>
            `;
          });
        }

        thread.innerHTML = html;

        // Show modal
        document.getElementById("message-modal").classList.add("active");

        // Scroll to bottom of conversation
        setTimeout(() => {
          thread.scrollTop = thread.scrollHeight;
        }, 100);

        // Refresh list to update unread status
        loadMessages();
      }

      // Close modal
      function closeModal() {
        document.getElementById("message-modal").classList.remove("active");
        currentMessageId = null;
        document.getElementById("reply-input").value = "";
      }

      // Send reply
      function sendReply(event) {
        event.preventDefault();

        const replyText = document.getElementById("reply-input").value.trim();
        if (!replyText || !currentMessageId) return;

        const messages = JSON.parse(localStorage.getItem("contactMessages") || "[]");
        const messageIndex = messages.findIndex((m) => (m.id || m.date) === currentMessageId);

        if (messageIndex === -1) return;

        if (!messages[messageIndex].replies) {
          messages[messageIndex].replies = [];
        }

        messages[messageIndex].replies.push({
          sender: "customer",
          text: replyText,
          date: new Date().toISOString(),
        });

        messages[messageIndex].lastReadTime = new Date().toISOString();

        localStorage.setItem("contactMessages", JSON.stringify(messages));

        // Clear input and refresh
        document.getElementById("reply-input").value = "";
        openMessage(currentMessageId);
      }

      // Close modal on outside click
      document.getElementById("message-modal").addEventListener("click", function (e) {
        if (e.target === this) {
          closeModal();
        }
      });

      // Close modal on Escape key
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          closeModal();
        }
      });
    </script>
  </body>
</html>
